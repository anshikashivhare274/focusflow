<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FocusFlow</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <h1>FocusFlow</h1>

        <!-- Dark Mode Button -->
        <button id="themeToggle">🌙 Dark Mode</button>

        <!-- Timer Section -->
        <div class="timer-section">

            <h2>Pomodoro Timer</h2>
            <div class ="time-inputs">
               <input type="number" id="hoursInput" placeholder="HH" min="0">

               <input type="number" id="minutesInput" placeholder="MM" min="0" max="59">

               <input type="number" id="secondsInput" placeholder="SS" min="0" max="59">
            </div>

             <button id="setTimerBtn">Set Timer</button>
            <div id="timer">25:00</div>

            <button id="startBtn">Start</button>
            <button id="resetBtn">Reset</button>
            <p id="completionMessage"></p>

        </div>

        <!-- Task Section -->
        <div class="task-section">

            <h2>Today's Tasks</h2>

            <input type="text" id="taskInput" placeholder="Enter a task">

            <button id="addTaskBtn">Add Task</button>

            <ul id="taskList"></ul>

        </div>

        <!-- Progress Section -->
        <div class="progress-section">

            <h2>Progress</h2>

            <p id="sessionCount">Completed Sessions: 0</p>

            <p id="quoteText"> Stay focused and keep going 🥰</p>

        </div>
        <div class="progress-container">

            <div id="progressBar"></div>

        </div>

        <p id="progressText">0% Completed</p>

        <div class="history-container">
            <h2>Session History</h2>
            <ul id="sessionHistory"></ul>
        </div>

        <footer>
        <p>Built by Anshika</p>
        </footer>

    </div>
    <audio id="alarmSound" src="alarm.mp3.wav"></audio>

    <script src="script.js"></script>


    
</body>
</html>
